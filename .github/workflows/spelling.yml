name: Spelling

on:
  push:
    branches-ignore:
      - gh-readonly-queue/**
  pull_request:
  merge_group:

jobs:
  spelling:
    name: Check spelling
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
    - uses: crate-ci/typos@v1.39.0
